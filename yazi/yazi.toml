[mgr]
ratio = [1, 3, 4]

[opener]
fx = [
	{ run = 'fx "$@"', desc = "fx", block = true }
]

[open]
prepend_rules = [
	{ url = "*.json", use = ["edit", "fx"] }
]

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
id    = "git" # Remove if Yazi > v26.1.22
url   = "*/"
run   = "git"
group = "git"

