# Prefix: backtick
set-option -g prefix `
unbind C-b
bind-key ` send-prefix

# Mouse support
set -g mouse on

# Terminal
set -g default-terminal tmux-256color
set -sg escape-time 0
set -g history-limit 30000

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Window titles
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# Status bar: just session name on the left, nothing on the right
set -g status-style "reverse"
set -g status-justify centre
set -g status-left " [#S] "
set -g status-right ""

# Active window in status bar
setw -g window-status-current-style "fg=white,bg=blue,bold"
setw -g window-status-style "dim"

# Active pane gets a bright border, inactive panes get a dim one
set -g pane-active-border-style "fg=green"
set -g pane-border-style "fg=default"

# Clock
setw -g clock-mode-colour colour32
setw -g clock-mode-style 24

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# last-window moved from prefix+l to prefix+\;
bind \; last-window

# Splits
bind-key | split-window -h
bind-key - split-window -v

# Reorder windows (-d keeps focus on the moved window)
bind-key -r S-Left swap-window -d -t -1
bind-key -r S-Right swap-window -d -t +1

# Copy mode with system clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind p paste-buffer
